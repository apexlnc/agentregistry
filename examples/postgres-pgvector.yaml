---
apiVersion: v1
kind: Namespace
metadata:
  name: agentregistry
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pgvector-data
  namespace: agentregistry
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-pgvector
  namespace: agentregistry
  labels:
    app: postgres-pgvector
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres-pgvector
  template:
    metadata:
      labels:
        app: postgres-pgvector
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: pgvector/pgvector:0.8.2-pg16
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: "agent-registry"
            - name: POSTGRES_USER
              value: "agentregistry"
            - name: POSTGRES_PASSWORD
              value: "agentregistry"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U agentregistry -d agent-registry
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
            successThreshold: 1
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U agentregistry -d agent-registry
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pgvector-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-pgvector
  namespace: agentregistry
  labels:
    app: postgres-pgvector
spec:
  type: ClusterIP
  selector:
    app: postgres-pgvector
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
